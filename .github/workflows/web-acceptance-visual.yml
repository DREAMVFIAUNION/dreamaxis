name: Web Acceptance Visual

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: dreamaxis-web-acceptance-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rich-text-acceptance:
    name: Rich text acceptance visual
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        shell: pwsh
        run: pnpm install --frozen-lockfile --config.node-linker=hoisted

      - name: Install Playwright browser
        shell: pwsh
        run: pnpm exec playwright install chromium

      - name: Build web app
        shell: pwsh
        run: pnpm --filter @dreamaxis/web build

      - name: Prepare web log paths
        shell: pwsh
        run: |
          $stdout = Join-Path $env:RUNNER_TEMP "dreamaxis-web.out.log"
          $stderr = Join-Path $env:RUNNER_TEMP "dreamaxis-web.err.log"
          "WEB_STDOUT=$stdout" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WEB_STDERR=$stderr" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run rich-text acceptance visual check
        shell: pwsh
        env:
          DREAMAXIS_ACCEPTANCE_BASE_URL: http://127.0.0.1:3000
        run: |
          $target = "http://127.0.0.1:3000/acceptance/rich-text-v1"
          $stdout = $env:WEB_STDOUT
          $stderr = $env:WEB_STDERR
          $webDir = Join-Path $env:GITHUB_WORKSPACE "apps\\web"

          function Show-LogTail([string]$path, [string]$label) {
            Write-Host "---- $label (tail) ----"
            if (Test-Path $path) {
              Get-Content -Path $path -Tail 40 -ErrorAction SilentlyContinue
            } else {
              Write-Host "(missing)"
            }
          }

          function Show-LogFull([string]$path, [string]$label) {
            Write-Host "==== $label (full) ===="
            if (Test-Path $path) {
              Get-Content -Path $path -ErrorAction SilentlyContinue
            } else {
              Write-Host "(missing)"
            }
          }

          $lastStatus = "no-response"
          $lastError = $null
          $webProcess = $null

          try {
            $webProcess = Start-Process -FilePath "cmd.exe" -ArgumentList "/d", "/c", "pnpm start" -WorkingDirectory $webDir -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru
            Write-Host "Started web app PID=$($webProcess.Id) in $webDir"

            for ($i = 1; $i -le 60; $i++) {
              $processAlive = $null -ne (Get-Process -Id $webProcess.Id -ErrorAction SilentlyContinue)

              try {
                $response = Invoke-WebRequest -UseBasicParsing -Uri $target -TimeoutSec 5
                $lastStatus = [string]$response.StatusCode
                if ($response.StatusCode -eq 200) {
                  Write-Host "Acceptance route ready on attempt $i with HTTP 200."
                  break
                }
              } catch {
                if ($_.Exception.Response -and $_.Exception.Response.StatusCode) {
                  $lastStatus = [string][int]$_.Exception.Response.StatusCode
                } else {
                  $lastStatus = "request-error"
                }
                $lastError = $_.Exception.Message
              }

              if ($i % 10 -eq 0) {
                Write-Host "Attempt $i/60 -> status=$lastStatus ; processAlive=$processAlive"
                if ($lastError) {
                  Write-Host "Last probe error: $lastError"
                }
                Show-LogTail $stdout "web stdout"
                Show-LogTail $stderr "web stderr"
                Write-Host "---- netstat :3000 ----"
                netstat -ano | Select-String ":3000"
              }

              Start-Sleep -Seconds 2
            }

            if ($lastStatus -ne "200") {
              Write-Host "Acceptance route did not become ready in time."
              Write-Host "Last observed status: $lastStatus"
              Write-Host "Last observed processAlive: $($null -ne (Get-Process -Id $webProcess.Id -ErrorAction SilentlyContinue))"
              if ($lastError) {
                Write-Host "Last probe error: $lastError"
              }
              Show-LogFull $stdout "web stdout"
              Show-LogFull $stderr "web stderr"
              Write-Host "---- netstat :3000 ----"
              netstat -ano | Select-String ":3000"
              throw "Acceptance route did not become ready in time."
            }

            pnpm acceptance:rich-text
          } finally {
            if ($webProcess -and (Get-Process -Id $webProcess.Id -ErrorAction SilentlyContinue)) {
              Stop-Process -Id $webProcess.Id -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rich-text-acceptance-visual
          path: |
            artifacts/acceptance/rich-text-v1
            ${{ runner.temp }}\dreamaxis-web.out.log
            ${{ runner.temp }}\dreamaxis-web.err.log
          if-no-files-found: warn
          retention-days: 7

      - name: Stop web app
        if: always()
        shell: pwsh
        run: |
          if ($env:WEB_PID -and (Get-Process -Id $env:WEB_PID -ErrorAction SilentlyContinue)) {
            Stop-Process -Id $env:WEB_PID -Force -ErrorAction SilentlyContinue
          }
